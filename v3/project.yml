name: Sutsumu

options:
  bundleIdPrefix: cat.sergicastillo.sutsumu
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"
  generateEmptyDirectories: true
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: Q479WYX9TL
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

schemes:
  Sutsumu:
    build:
      targets:
        Sutsumu: all
    run:
      config: Debug
    test:
      config: Debug
      targets: [SutsumuTests]
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

targets:
  Sutsumu:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    bundleIdSuffix: v3
    sources:
      - path: Sources
    resources:
      - path: Resources
    settings:
      base:
        PRODUCT_NAME: Sutsumu
        PRODUCT_BUNDLE_IDENTIFIER: cat.sergicastillo.sutsumu.v3
        INFOPLIST_FILE: Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: YES
        CODE_SIGN_ENTITLEMENTS: Resources/Sutsumu.entitlements
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"

  SutsumuTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
    dependencies:
      - target: Sutsumu
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cat.sergicastillo.sutsumu.v3.tests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Sutsumu.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Sutsumu"
